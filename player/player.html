<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bootstrap Video Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="player.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="video-container shadow">
        <div class="menu_button position-absolute top-0 start-0 m-3 p-2 bg-dark rounded-circle" id="menuBtn"
            style="z-index:3; cursor:pointer;">
            <i class="fa-solid fa-bars text-white fs-4"></i>
        </div>
        <div class="menu-dropdown bg-dark text-white rounded shadow" id="menuDropdown">
            <ul class="list-unstyled mb-0">
                <li class="p-2 menu-item" tabindex="0"><a href="../main/index.html">Нүүр</a></li>
                <li class="p-2 menu-item" tabindex="0"><a href="../login/login.html">Нэвтрэх</a></li>
                <li class="p-2 menu-item" tabindex="0"><a href="../login/register/register.html">Бүртгүүлэх</a></li>
                <li class="p-2 menu-item" tabindex="0"><a href="../calculator/calculator.html">Тооны Машин</a></li>
                <li class="p-2 menu-item" tabindex="0"><a href="../map/map.html">Газрын зураг</a></li>
            </ul>
        </div>
        <video id="video" width="100%" height="340" src="./Vande - Gurvan Ug (Official Music Video).mp4"></video>
        <div class="video-controls d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <button class="btn btn-light me-2" id="rewind" title="Rewind 10s">
                    <i class="fa-solid fa-backward"></i>10s
                </button>
                <button class="btn btn-light me-2" id="playpause" title="Play/Pause">
                    <i class="fa-solid fa-play"></i>
                </button>
                <button class="btn btn-light me-2" id="forward" title="Forward 10s">
                    10s <i class="fa-solid fa-forward"></i>
                </button>
            </div>
            <div class="flex-grow-1 mx-3 d-flex align-items-center" style="min-width: 0;">
                <span id="current-time" class="text-white small me-2" style="width:48px; text-align:right;">0:00</span>
                <input type="range" id="timebar" class="form-range progress-bar-range flex-grow-1" min="0" value="0"
                    step="0.01">
                <span id="duration" class="text-white small ms-2" style="width:48px;">0:00</span>
            </div>
            <div class="d-flex align-items-center ms-2">
                <span class="text-white me-2">🔊</span>
                <input type="range" id="volume" class="form-range volume-slider" min="0" max="1" step="0.01" value="1">
            </div>
        </div>
    </div>
    <script src="player.js"></script>
</body>

</html>
